<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت</title>

<style>
body{background:#111;color:#fff;font-family:tahoma;padding:20px}
.box{max-width:400px;margin:80px auto;background:#1c1c1c;padding:20px;border-radius:15px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none}
input{background:#2a2a2a;color:#fff}
button{background:#d4af37;font-weight:bold;cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>ورود مدیریت</h2>
<input type="password" id="pass">
<button id="loginBtn">ورود</button>
</div>

<div class="box hidden" id="panel">
<h2>پنل</h2>
<p>ورود موفق</p>
</div>

<script src="./admin.js"></script>

</body>
</html>
