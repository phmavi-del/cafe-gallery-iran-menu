<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>پنل مدیریت</title>

<style>
body{background:#111;color:#fff;font-family:tahoma;padding:20px}
.box{max-width:400px;margin:80px auto;background:#1c1c1c;padding:20px;border-radius:15px}
input,button{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:none}
input{background:#2a2a2a;color:#fff}
button{background:#d4af37;font-weight:bold;cursor:pointer}
.hidden{display:none}
.card{background:#222;padding:10px;margin:10px 0;border-radius:10px}
img{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>🔐 ورود</h2>
<input type="password" id="pass" placeholder="رمز">
<button onclick="login()">ورود</button>
</div>

<div class="box hidden" id="panel">

<h2>🍔 منو</h2>

<input id="name" placeholder="نام غذا">
<input id="price" placeholder="قیمت">
<input type="file" id="img">

<button onclick="addFood()">➕ افزودن</button>

<hr>

<button onclick="makeQR()">ساخت QR</button>
<div id="qrBox"></div>

<hr>

<div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="./admin.js"></script>

</body>
</html>
