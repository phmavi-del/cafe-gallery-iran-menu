<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت کافه گالری ایران</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#111;
color:white;
padding:20px;
}

#loginBox{
max-width:400px;
margin:100px auto;
background:#1c1c1c;
padding:25px;
border-radius:20px;
border:1px solid #333;
}

#panel{display:none;}

.topbar{
text-align:center;
margin-bottom:25px;
}

.topbar h1{
color:#d4af37;
}

.section{
background:#1b1b1b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
border:1px solid #333;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:none;
}

input,select{
background:#2a2a2a;
color:white;
}

button{
background:#d4af37;
color:black;
font-weight:bold;
cursor:pointer;
}

.card{
background:#252525;
padding:15px;
border-radius:15px;
margin-bottom:10px;
border:1px solid #333;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.delete-btn{
background:#d9534f;
color:white;
}
</style>
</head>

<body>

<div id="loginBox">
<h2 style="text-align:center">🔐 ورود</h2>
<input type="password" id="password" placeholder="رمز">
<button onclick="login()">ورود</button>
</div>

<div id="panel">

<div class="topbar">
<h1>☕ کافه گالری ایران</h1>
</div>

<div class="section">
<h3>افزودن غذا</h3>

<input id="name" placeholder="نام">
<input id="price" placeholder="قیمت">
<input type="file" id="image">

<select id="category">
<option>پیتزا</option>
<option>برگر</option>
<option>ساندویچ</option>
<option>سالاد</option>
<option>پاستا</option>
<option>پیش غذا</option>
<option>دسر</option>
<option>بار گرم و سرد</option>
</select>

<button onclick="addItem()">افزودن</button>
</div>

<div class="section">
<h3>لیست</h3>
<div id="list"></div>
</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="./admin.js"></script>

</body>
</html>
