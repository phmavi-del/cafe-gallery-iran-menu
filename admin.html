<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>پنل مدیریت کافه</title>

<style>
body{background:#111;color:#fff;font-family:tahoma;padding:20px}
.box{max-width:500px;margin:20px auto;background:#1c1c1c;padding:20px;border-radius:15px}
input,select,button{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:none}
input,select{background:#2a2a2a;color:#fff}
button{background:#d4af37;font-weight:bold;cursor:pointer}
.card{background:#222;padding:10px;margin:10px 0;border-radius:10px}
img{width:100%;border-radius:10px}
.hidden{display:none}
#qrBox{text-align:center;margin-top:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>🔐 ورود مدیریت</h2>
<input type="password" id="pass" placeholder="رمز">
<button id="loginBtn">ورود</button>
</div>

<!-- PANEL -->
<div class="box hidden" id="panel">

<h2>🍔 مدیریت منو</h2>

<input id="name" placeholder="نام غذا">
<input id="price" placeholder="قیمت">

<input type="file" id="img">

<select id="cat">
<option>پیتزا</option>
<option>برگر</option>
<option>ساندویچ</option>
<option>سالاد</option>
<option>پاستا</option>
<option>دسر</option>
<option>بار گرم و سرد</option>
</select>

<button id="addBtn">➕ افزودن غذا</button>

<hr>

<h3>🔗 QR منو</h3>
<button onclick="makeQR()">ساخت QR</button>
<div id="qrBox"></div>

<hr>

<h3>لیست غذاها</h3>
<div id="list"></div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="./admin.js"></script>

</body>
</html>
