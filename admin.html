<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>پنل مدیریت کافه گالری ایران</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:tahoma;
  padding:20px;
}

.box{
  max-width:900px;
  margin:auto;
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#2a2a2a;
  color:#fff;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#d4af37;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

.card{
  background:#222;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>ورود پنل</h2>
<input type="password" id="pass" placeholder="رمز">
<button onclick="login()">ورود</button>
</div>

<div class="box" id="panel" style="display:none">

<h2>مدیریت منو</h2>

<input id="name" placeholder="نام غذا">
<input id="price" placeholder="قیمت">

<select id="category">
  <option>پیتزا</option>
  <option>برگر</option>
  <option>ساندویچ</option>
  <option>سالاد</option>
  <option>پاستا</option>
  <option>پیش غذا</option>
  <option>دسر</option>
  <option>بار گرم و سرد</option>
</select>

<input type="file" id="image">

<button onclick="addFood()">➕ افزودن غذا</button>

<hr>

<div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>

</body>
</html>
